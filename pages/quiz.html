<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퀴즈 PAGE</title>
</head>

<body>
    <div class="min-h-screen bg-white flex flex-col">

    <div id="headerSlot"></div>

        <!-- Progress Bar -->
        <div class="h-1 bg-black/5">
            <div class="h-full bg-black transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <main class="flex-1 px-6 py-8">
            <div class="max-w-md mx-auto flex flex-col gap-6">

                <!-- 문제 번호 / 난이도 -->
                <div class="flex items-center justify-between">
                    <span class="text-sm text-black/40">문제 1 / 10</span>
                    <span class="text-xs rounded px-2 py-1 bg-green-100 text-green-700">쉬움</span>
                </div>

                <!-- 문제 제목 -->
                <p class="text-sm font-medium text-black/60"></p>

                <!-- 문제 내용 -->
                <p class="text-xl"></p>

                <!-- 보기 목록 (API로 동적 렌더링) -->
                <div id="optionsList" class="space-y-3"></div>

                <!-- 결과 영역 (API로 동적 렌더링) -->
                <div id="resultArea" class="hidden space-y-3">
                    <div id="resultMessage" class="flex items-center gap-2 p-4 rounded-lg bg-black/5"></div>
                    <div class="p-4 bg-black/5 rounded-lg text-sm">
                        <p class="font-medium text-black/60 mb-1">해설</p>
                        <p id="explanationText"></p>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="text-sm text-red-500 text-center py-3 hidden"></div>

                <!-- Action Buttons (제출 전) -->
                <div id="beforeSubmit" class="flex gap-3">
                    <button id="skipBtn"
                        class="flex-1 py-4 border border-black/20 rounded-lg hover:bg-black/5 transition-colors">
                        스킵
                    </button>
                    <button id="submitBtn"
                        class="flex-1 py-4 rounded-lg transition-colors bg-black/10 text-black/40 cursor-not-allowed"
                        disabled>
                        제출
                    </button>
                </div>

                <!-- Action Buttons (제출 후) -->
                <div id="afterSubmit" class="hidden">
                    <button id="nextBtn"
                        class="w-full bg-black text-white py-4 rounded-lg hover:bg-black/90 transition-colors">
                        다음 문제
                    </button>
                </div>

            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/pages/quiz.js"></script>
</body>

</html>
