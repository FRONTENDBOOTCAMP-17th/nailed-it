<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문제 등록 PAGE</title>
</head>

<body>
    <div class="min-h-screen bg-white">

        <!-- Header -->
        <header class="px-6 py-4 border-b border-black/10">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/pages/admin/quiz-list.html"
                        class="p-2 -ml-2 hover:bg-black/5 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m12 19-7-7 7-7"></path>
                            <path d="M19 12H5"></path>
                        </svg>
                    </a>
                    <h2 class="font-medium">문제 등록</h2>
                </div>
                <button id="logoutBtn"
                    class="flex items-center gap-2 px-4 py-2 text-sm border border-black/20 rounded-lg hover:bg-black/5 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    로그아웃
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-6 py-8">
            <div class="max-w-4xl mx-auto">
                <form id="newQuestionForm" class="space-y-6">

                    <!-- Title -->
                    <div class="space-y-2">
                        <label for="title" class="block text-sm font-medium">
                            퀴즈 제목 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="title" name="title" required
                            class="w-full px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20"
                            placeholder="예: HTML의 정식 명칭" />
                    </div>

                    <!-- Category -->
                    <div class="space-y-2">
                        <label for="category" class="block text-sm font-medium">
                            카테고리 <span class="text-red-500">*</span>
                        </label>
                        <select id="category" name="category" required
                            class="w-full px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20">
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="js">JavaScript</option>
                        </select>
                    </div>

                    <!-- Difficulty -->
                    <div class="space-y-2">
                        <label for="difficulty" class="block text-sm font-medium">
                            난이도 <span class="text-red-500">*</span>
                        </label>
                        <select id="difficulty" name="difficulty" required
                            class="w-full px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20">
                            <option value="easy">쉬움</option>
                            <option value="medium">보통</option>
                            <option value="hard">어려움</option>
                        </select>
                    </div>

                    <!-- Question Content -->
                    <div class="space-y-2">
                        <label for="question" class="block text-sm font-medium">
                            문제 내용 <span class="text-red-500">*</span>
                        </label>
                        <textarea id="question" name="question" required
                            class="w-full px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20 min-h-24"
                            placeholder="문제를 입력하세요"></textarea>
                    </div>

                    <!-- Options -->
                    <div class="space-y-4">
                        <label class="block text-sm font-medium">
                            보기 <span class="text-red-500">*</span>
                        </label>
                        <div class="space-y-3">

                            <div class="flex items-center gap-3">
                                <input type="radio" id="correct-1" name="answer" value="0" class="w-4 h-4" />
                                <label for="correct-1" class="text-sm text-black/60 w-12">정답</label>
                                <input type="text" id="option1" name="option1" required
                                    class="flex-1 px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20"
                                    placeholder="보기 1" />
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="radio" id="correct-2" name="answer" value="1" class="w-4 h-4" />
                                <label for="correct-2" class="text-sm text-black/60 w-12">정답</label>
                                <input type="text" id="option2" name="option2" required
                                    class="flex-1 px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20"
                                    placeholder="보기 2" />
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="radio" id="correct-3" name="answer" value="2" class="w-4 h-4" />
                                <label for="correct-3" class="text-sm text-black/60 w-12">정답</label>
                                <input type="text" id="option3" name="option3" required
                                    class="flex-1 px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20"
                                    placeholder="보기 3" />
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="radio" id="correct-4" name="answer" value="3" class="w-4 h-4" />
                                <label for="correct-4" class="text-sm text-black/60 w-12">정답</label>
                                <input type="text" id="option4" name="option4" required
                                    class="flex-1 px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20"
                                    placeholder="보기 4" />
                            </div>
                        </div>
                    </div>

                    <!-- Explanation -->
                    <div class="space-y-2">
                        <label for="explanation" class="block text-sm font-medium">
                            해설 <span class="text-red-500">*</span>
                        </label>
                        <textarea id="explanation" name="explanation" required
                            class="w-full px-4 py-3 border border-black/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-black/20 min-h-24"
                            placeholder="정답에 대한 해설을 입력하세요"></textarea>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="text-sm text-red-500 text-center hidden"></div>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 pt-4">
                        <a href="/pages/admin/quiz-list.html"
                            class="flex-1 py-4 border border-black/20 rounded-lg hover:bg-black/5 transition-colors text-center">
                            취소
                        </a>
                        <button type="submit" id="submitBtn"
                            class="flex-1 bg-black text-white py-4 rounded-lg hover:bg-black/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            등록
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
