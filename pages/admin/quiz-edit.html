<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문제 수정 PAGE</title>
</head>

<body>
    <div class="min-h-screen bg-white">

        <!-- Header -->
        <header class="px-6 py-4 border-b border-black/10">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/pages/admin/quiz-detail.html"
                        class="p-2 -ml-2 hover:bg-black/5 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m12 19-7-7 7-7"></path>
                            <path d="M19 12H5"></path>
                        </svg>
                    </a>
                    <h2 class="font-medium">문제 수정</h2>
                </div>
                <button id="logoutBtn"
                    class="flex items-center gap-2 px-4 py-2 text-sm border border-black/20 rounded-lg hover:bg-black/5 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    로그아웃
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-6 py-8">
            <div class="max-w-4xl mx-auto">
                <form id="editQuestionForm" class="space-y-6">

                    <!-- API로 받아와야 표시 가능: title -->

                    <!-- API로 받아와야 표시 가능: category -->

                    <!-- API로 받아와야 표시 가능: difficulty -->

                    <!-- API로 받아와야 표시 가능: question -->

                    <!-- API로 받아와야 표시 가능: options, answer -->

                    <!-- API로 받아와야 표시 가능: explanation -->

                    <!-- Error Message -->
                    <div id="errorMessage" class="text-sm text-red-500 text-center hidden"></div>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 pt-4">
                        <a href="/pages/admin/quiz-detail.html"
                            class="flex-1 py-4 border border-black/20 rounded-lg hover:bg-black/5 transition-colors text-center">
                            취소
                        </a>
                        <!-- API로 받아와야 작동 가능: 수정 완료 (문제 id 필요) -->
                        <button type="submit" id="submitBtn"
                            class="flex-1 bg-black text-white py-4 rounded-lg hover:bg-black/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            수정 완료
                        </button>
                    </div>

                </form>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/pages/admin/quiz-edit.js"></script>
</body>

</html>
