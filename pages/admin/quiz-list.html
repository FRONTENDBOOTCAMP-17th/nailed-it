<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문제 관리 PAGE</title>
</head>

<body>
    <div class="min-h-screen bg-white">

        <!-- Header -->
        <header class="px-6 py-4 border-b border-black/10">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <h1 class="font-bold">NAILED-IT 관리자</h1>
                <button id="logoutBtn"
                    class="flex items-center gap-2 px-4 py-2 text-sm border border-black/20 rounded-lg hover:bg-black/5 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    로그아웃
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-6 py-8">
            <div class="max-w-4xl mx-auto space-y-6">

                <!-- Title & Actions -->
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-medium">문제 관리</h2>
                    <a href="question-new.html"
                        class="flex items-center gap-2 px-4 py-2 bg-black text-white rounded-lg hover:bg-black/90 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        문제 등록
                    </a>
                </div>

                <!-- Category Filter -->
                <div class="flex gap-2 flex-wrap">
                    <button class="px-4 py-2 rounded-lg transition-colors bg-black text-white"
                        onclick="filterCategory(this, '전체')">전체</button>
                    <button class="px-4 py-2 rounded-lg transition-colors border border-black/20 hover:bg-black/5"
                        onclick="filterCategory(this, 'HTML')">HTML</button>
                    <button class="px-4 py-2 rounded-lg transition-colors border border-black/20 hover:bg-black/5"
                        onclick="filterCategory(this, 'CSS')">CSS</button>
                    <button class="px-4 py-2 rounded-lg transition-colors border border-black/20 hover:bg-black/5"
                        onclick="filterCategory(this, 'JavaScript')">JavaScript</button>
                </div>

                <!-- Questions Table -->
                <div class="border border-black/10 rounded-lg overflow-hidden">

                    <!-- Table Header -->
                    <div
                        class="grid grid-cols-12 gap-4 px-6 py-3 bg-black/5 border-b border-black/10 text-sm font-medium">
                        <div class="col-span-1">번호</div>
                        <div class="col-span-2">카테고리</div>
                        <div class="col-span-5">제목</div>
                        <div class="col-span-2">난이도</div>
                        <div class="col-span-2">생성일</div>
                    </div>

                    <!-- Table Body -->
                    <div id="tableBody" class="divide-y divide-black/10">
                        <div class="px-6 py-12 text-center text-black/40">
                            문제를 불러오는 중...
                        </div>
                    </div>

                </div>

                <!-- Stats -->
                <div id="stats" class="flex gap-4 text-sm text-black/60 flex-wrap"></div>

            </div>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
