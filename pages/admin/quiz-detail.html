<!DOCTYPE html>
<html lang="ko">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문제 상세 PAGE</title>

<body>

        <!-- Header -->
        <header class="px-6 py-4 border-b border-black/10">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/pages/admin/quiz-list.html" class="p-2 -ml-2 hover:bg-black/5 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"

                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    로그아웃
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-6 py-8">
            <div class="max-w-4xl mx-auto space-y-8">

                <div class="space-y-6">

                    <!-- API로 받아와야 표시 가능: category, difficulty, createdAt -->

                    <!-- API로 받아와야 표시 가능: title -->

                    <!-- API로 받아와야 표시 가능: question -->

                    <!-- API로 받아와야 표시 가능: options, answer -->

                    <!-- API로 받아와야 표시 가능: explanation -->

                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <a href="/pages/admin/quiz-list.html"
                        class="flex-1 py-4 border border-black/20 rounded-lg hover:bg-black/5 transition-colors text-center">

                    </a>
                    <!-- API로 받아와야 작동 가능: 수정 (문제 id 필요) -->
                    <a href="/pages/admin/quiz-edit.html"

                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>

                    <button id="deleteBtn"
                        class="flex items-center justify-center gap-2 px-6 py-4 border border-red-600 text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    </button>

            </div>

    <script type="module" src="/src/pages/admin/quiz-detail.js"></script>
