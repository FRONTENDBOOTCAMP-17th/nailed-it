<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>히스토리 PAGE</title>
</head>

<body>
    <div class="min-h-screen bg-white">
    <div id="headerSlot"></div>

        <!-- Main Content -->
        <main class="px-6 py-8">
            <div class="max-w-4xl mx-auto space-y-6">

                <!-- API로 받아와야 표시 가능: user.nickname -->
                <div class="text-center">
                    <p class="text-black/60"></p>
                </div>

                <!-- Category Filter (API로 동적 렌더링) -->
                <div class="flex gap-2 flex-wrap justify-center" id="filterArea"></div>

                <!-- Session List (API로 동적 렌더링) -->
                <div id="sessionList"></div>

                <!-- Total Count (API로 동적 렌더링) -->
                <div id="totalCount" class="text-center text-sm text-black/60"></div>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
